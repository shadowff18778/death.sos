<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Death.SOS</title>
    <style>
        :root {
            --ios-blur: blur(40px) saturate(200%);
            --ios-bg: rgba(255, 255, 255, 0.08);
            --ios-border: rgba(255, 255, 255, 0.12);
            --text-main: #ffffff;
            --text-sub: rgba(255, 255, 255, 0.5);
            --system-red: #ff3b30;
            --system-blue: #007aff;
            --system-green: #34c759;
        }

        /* Verrouillage Total */
        * {
            box-sizing: border-box;
            -webkit-user-select: none;
            user-select: none;
            -webkit-tap-highlight-color: transparent;
            margin: 0;
            padding: 0;
        }

        body {
            height: 100vh;
            background: #000;
            background-image: radial-gradient(circle at 50% 50%, #1c1c1e 0%, #000 100%);
            font-family: -apple-system, system-ui, sans-serif;
            color: var(--text-main);
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            align-items: center;
            overflow: hidden;
            padding: env(safe-area-inset-top) 20px env(safe-area-inset-bottom) 20px;
        }

        /* Titre Flottant */
        header {
            margin-top: 5vh;
            text-align: center;
            animation: float 4s ease-in-out infinite;
        }

        @keyframes float {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-10px); }
        }

        header h1 {
            font-size: clamp(32px, 8vw, 48px);
            font-weight: 800;
            letter-spacing: -2px;
            background: linear-gradient(180deg, #fff 30%, rgba(255,255,255,0.4) 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        /* Carte Glassmorphism Liquide */
        .glass-card {
            background: var(--ios-bg);
            backdrop-filter: var(--ios-blur);
            -webkit-backdrop-filter: var(--ios-blur);
            border: 1px solid var(--ios-border);
            border-radius: 40px;
            padding: 35px;
            width: 100%;
            max-width: 420px;
            text-align: center;
            box-shadow: 0 30px 60px rgba(0,0,0,0.6);
            
            /* Animation Élastique */
            transform: scale(0.8) translateY(50px);
            opacity: 0;
            animation: liquidIn 1s cubic-bezier(0.2, 1.4, 0.3, 1) forwards;
        }

        @keyframes liquidIn {
            to { transform: scale(1) translateY(0); opacity: 1; }
        }

        h2 { font-size: 24px; color: var(--system-red); margin-bottom: 15px; }
        p { font-size: 16px; color: var(--text-sub); line-height: 1.5; }

        /* Boutons Style iPhone */
        .btn-group {
            display: flex;
            flex-direction: column;
            gap: 15px;
            margin-top: 30px;
        }

        button {
            width: 100%;
            padding: 18px;
            font-size: 17px;
            font-weight: 600;
            border-radius: 18px;
            border: none;
            cursor: pointer;
            transition: transform 0.2s cubic-bezier(0.4, 0, 0.2, 1), background 0.3s;
            color: #fff;
        }

        button:active { transform: scale(0.92); }
        .btn-main { background: var(--system-red); }
        .btn-sub { background: rgba(255,255,255,0.1); }
        .btn-start { background: var(--system-green); font-size: 20px; }

        /* Interface Benchmark */
        #benchmark-ui { display: none; }

        .loader-container {
            margin: 25px 0;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .liquid-spinner {
            width: 80px;
            height: 80px;
            border: 6px solid var(--ios-border);
            border-top: 6px solid var(--system-red);
            border-radius: 50%;
            animation: spin 0.6s cubic-bezier(0.5, 0.1, 0.5, 0.9) infinite;
            filter: drop-shadow(0 0 10px var(--system-red));
        }

        @keyframes spin { to { transform: rotate(360deg); } }

        #timer {
            font-size: 50px;
            font-weight: 800;
            margin-top: 20px;
            font-variant-numeric: tabular-nums;
            font-family: 'Courier New', Courier, monospace;
        }

        #stress-meter {
            width: 100%;
            height: 6px;
            background: rgba(255,255,255,0.1);
            border-radius: 10px;
            margin-top: 15px;
            overflow: hidden;
        }

        #stress-bar {
            width: 0%;
            height: 100%;
            background: linear-gradient(90deg, var(--system-green), var(--system-red));
            transition: width 1s linear;
        }

        /* Signature */
        footer {
            margin-bottom: 2vh;
            color: var(--text-sub);
            font-size: 13px;
            font-weight: 500;
            letter-spacing: 1px;
            text-transform: uppercase;
        }

        #btn-abort {
            display: none;
            color: var(--system-red);
            background: rgba(255,59,48,0.1);
            border: 1px solid var(--system-red);
            margin-top: 20px;
        }
    </style>
</head>
<body>

    <header>
        <h1>Death.SOS</h1>
    </header>

    <!-- Écran 1: Avertissement -->
    <div id="card-warning" class="glass-card">
        <h2>Extreme Stress Test</h2>
        <p>Ce protocole va saturer chaque transistor de votre processeur. Surchauffe garantie.</p>
        <div class="btn-group">
            <button class="btn-main" onclick="goToMain()">J'accepte les risques</button>
            <button class="btn-sub" onclick="window.location.href='about:blank'">Quitter</button>
        </div>
    </div>

    <!-- Écran 2: Site Principal -->
    <div id="benchmark-ui" class="glass-card">
        <p id="info-text">Prêt pour l'injection ?</p>
        
        <div class="loader-container" id="loading-zone" style="display:none;">
            <div class="liquid-spinner"></div>
            <div id="timer">01:30</div>
            <div id="stress-meter"><div id="stress-bar"></div></div>
            <p style="margin-top: 10px; color: var(--system-red); font-weight: bold;">CPU SATURATION AT MAX</p>
        </div>

        <div class="btn-group">
            <button id="btn-start" class="btn-start" onclick="startFlame()">START BENCHMARK</button>
            <button id="btn-abort" onclick="stopEverything()">ABORT MISSION</button>
        </div>

        <p style="font-size: 10px; color: var(--system-red); margin-top: 20px;">
            ⚠️ FREEZE ? Maintenez POWER 12 sec.
        </p>
    </div>

    <footer>Powered by Shadow</footer>

    <script>
        // Verrouillage Sécurité
        document.addEventListener('contextmenu', e => e.preventDefault());
        document.onkeydown = e => { if(e.keyCode == 123 || (e.ctrlKey && e.shiftKey)) return false; };

        let workers = [];
        let clockInterval;
        let time = 90;

        const workerCode = `
            self.onmessage = function() {
                // Algorithme de torture sans consommation massive de RAM
                function torture() {
                    let x = 0;
                    while(true) {
                        x = Math.sqrt(Math.random() * 1000000);
                        Math.atan2(Math.sin(x), Math.cos(x));
                        if(x % 1000000 == 0) { /* Petit repos pour pas crash le thread principal */ }
                    }
                }
                torture();
            };
        `;

        const blob = new Blob([workerCode], { type: 'application/javascript' });
        const workerURL = URL.createObjectURL(blob);

        function goToMain() {
            document.getElementById('card-warning').style.display = 'none';
            document.getElementById('benchmark-ui').style.display = 'block';
        }

        function startFlame() {
            document.getElementById('btn-start').style.display = 'none';
            document.getElementById('info-text').style.display = 'none';
            document.getElementById('loading-zone').style.display = 'flex';
            document.getElementById('btn-abort').style.display = 'block';

            // Détection des cœurs et lancement
            const cores = navigator.hardwareConcurrency || 8;
            for(let i = 0; i < cores; i++) {
                let w = new Worker(workerURL);
                w.postMessage('go');
                workers.push(w);
            }

            // Chrono et barre de stress
            clockInterval = setInterval(() => {
                time--;
                let min = Math.floor(time / 60).toString().padStart(2, '0');
                let sec = (time % 60).toString().padStart(2, '0');
                document.getElementById('timer').innerText = `${min}:${sec}`;
                
                // Progression barre de stress
                let prog = ((90 - time) / 90) * 100;
                document.getElementById('stress-bar').style.width = prog + '%';

                if(time <= 0) stopEverything(true);
            }, 1000);
        }

        function stopEverything(success = false) {
            clearInterval(clockInterval);
            workers.forEach(w => w.terminate());
            workers = [];
            
            document.getElementById('loading-zone').style.display = 'none';
            document.getElementById('btn-abort').style.display = 'none';
            document.getElementById('btn-start').style.display = 'block';
            document.getElementById('btn-start').innerText = "RETRY TEST";
            document.getElementById('info-text').style.display = 'block';
            document.getElementById('info-text').innerText = success ? "MISSION ACCOMPLIE 🔥" : "TEST ANNULÉ ❄️";
            document.getElementById('info-text').style.color = success ? "var(--system-green)" : "var(--system-red)";
        }
    </script>
</body>
</html>
