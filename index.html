<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Death.SOS | Pure Stress</title>
    <style>
        :root {
            --glass: rgba(255, 255, 255, 0.03);
            --glass-heavy: rgba(255, 255, 255, 0.1);
            --border: rgba(255, 255, 255, 0.15);
            --red: #ff3b30;
            --green: #34c759;
        }

        * {
            box-sizing: border-box;
            -webkit-user-select: none;
            user-select: none;
            margin: 0;
            padding: 0;
            cursor: none !important; /* Cache le curseur pour plus d'immersion */
        }

        body {
            height: 100vh;
            background: #000;
            font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", sans-serif;
            color: white;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            padding: 20px;
        }

        /* Arrière-plan animé type liquide */
        .bg-glow {
            position: absolute;
            width: 150%;
            height: 150%;
            background: radial-gradient(circle at 50% 50%, #1a1a1a 0%, #000 70%);
            z-index: -1;
            animation: pulseBg 10s ease-in-out infinite;
        }

        @keyframes pulseBg {
            0%, 100% { transform: scale(1); opacity: 0.5; }
            50% { transform: scale(1.1); opacity: 0.8; }
        }

        /* Fenêtres avec animations fluides */
        .glass-panel {
            background: var(--glass);
            backdrop-filter: blur(50px) saturate(200%);
            -webkit-backdrop-filter: blur(50px) saturate(200%);
            border: 1px solid var(--border);
            border-radius: 45px;
            padding: 40px;
            width: 100%;
            max-width: 400px;
            text-align: center;
            box-shadow: 0 40px 100px rgba(0,0,0,0.8);
            
            /* Entrée liquide */
            transform: translateY(100px) scale(0.8);
            opacity: 0;
            animation: entry 1.2s cubic-bezier(0.19, 1, 0.22, 1) forwards;
        }

        @keyframes entry {
            to { transform: translateY(0) scale(1); opacity: 1; }
        }

        h1 {
            font-size: 42px;
            font-weight: 800;
            letter-spacing: -2px;
            margin-bottom: 10px;
            background: linear-gradient(180deg, #fff, #666);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        p { color: rgba(255,255,255,0.5); font-size: 16px; line-height: 1.4; margin-bottom: 30px; }

        /* Boutons iOS */
        .btn {
            width: 100%;
            padding: 20px;
            border-radius: 20px;
            border: none;
            font-size: 18px;
            font-weight: 700;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            margin-bottom: 15px;
        }

        .btn-red { background: var(--red); color: white; box-shadow: 0 10px 30px rgba(255, 59, 48, 0.3); }
        .btn-red:active { transform: scale(0.9) rotate(-1deg); }

        .btn-outline { background: rgba(255,255,255,0.05); color: white; border: 1px solid var(--border); }

        /* Timer de destruction */
        #timer {
            font-size: 64px;
            font-weight: 900;
            font-variant-numeric: tabular-nums;
            font-family: 'SF Mono', monospace;
            margin: 20px 0;
            text-shadow: 0 0 20px rgba(255,255,255,0.2);
        }

        .status-badge {
            display: inline-block;
            padding: 6px 14px;
            background: rgba(255,59,48,0.1);
            border: 1px solid var(--red);
            color: var(--red);
            border-radius: 100px;
            font-size: 12px;
            font-weight: 800;
            text-transform: uppercase;
            margin-bottom: 20px;
            animation: blink 1s infinite;
        }

        @keyframes blink { 0%, 100% { opacity: 1; } 50% { opacity: 0.4; } }

        footer {
            position: absolute;
            bottom: 30px;
            font-size: 12px;
            color: rgba(255,255,255,0.2);
            letter-spacing: 2px;
        }

        .safety-bar {
            font-size: 10px;
            color: var(--red);
            margin-top: 20px;
            opacity: 0.6;
        }
    </style>
</head>
<body>

    <div class="bg-glow"></div>

    <!-- ÉCRAN D'ACCUEIL -->
    <div id="screen-warning" class="glass-panel">
        <div class="status-badge">Danger : Overheat Zone</div>
        <h1>Death.SOS</h1>
        <p>Préparez-vous à une saturation matérielle totale. Chaque seconde multiplie la charge de calcul.</p>
        <button class="btn btn-red" onclick="startInterface()">ACCEPTER L'INJECTION</button>
        <button class="btn btn-outline" onclick="window.location.href='about:blank'">REFUSER</button>
    </div>

    <!-- ÉCRAN DE BENCHMARK -->
    <div id="screen-main" class="glass-panel" style="display:none;">
        <div id="timer">01:30</div>
        <p id="cpu-msg">CPU Ready for Execution...</p>
        <button id="start-trigger" class="btn btn-red" onclick="launchTrueHell()">START BURNER</button>
        <button id="abort-btn" class="btn btn-outline" style="display:none;" onclick="stopDeath()">ABORT IMMEDIATELY</button>
        <div class="safety-bar">FORCE REBOOT : HOLD POWER 12S</div>
    </div>

    <footer>POWERED BY SHADOW</footer>

    <script>
        // Verrouillage total pour mobile/PC
        document.addEventListener('contextmenu', e => e.preventDefault());
        document.onkeydown = e => { if(e.keyCode == 123) return false; };

        let workers = [];
        let timerInt;
        let count = 90;

        // LE MOTEUR DE DESTRUCTION (Worker hyper complexe)
        const workerScript = `
            self.onmessage = function() {
                function isPrime(num) {
                    for(let i = 2, s = Math.sqrt(num); i <= s; i++)
                        if(num % i === 0) return false; 
                    return num > 1;
                }

                function heavyLogic() {
                    let iterations = 0;
                    while(true) {
                        // 1. Calcul de nombres premiers sur des grands nombres
                        let start = Math.floor(Math.random() * 1000000000);
                        for(let i = start; i < start + 500; i++) {
                            isPrime(i);
                        }

                        // 2. Calcul de Fibonacci récursif (Torture de la pile d'appel)
                        function fib(n) {
                            if (n <= 1) return n;
                            return fib(n - 1) + fib(n - 2);
                        }
                        fib(25); // Juste assez pour saturer sans crash immédiat

                        // 3. Opérations Bitwise agressives
                        let a = 0x12345678;
                        for(let j = 0; j < 100000; j++) {
                            a = (a ^ (a << 13)) ^ (a >> 17);
                            a ^= (a << 5);
                        }
                        
                        iterations++;
                    }
                }
                heavyLogic();
            };
        `;

        const blob = new Blob([workerScript], { type: 'application/javascript' });
        const workerURL = URL.createObjectURL(blob);

        function startInterface() {
            document.getElementById('screen-warning').style.display = 'none';
            const main = document.getElementById('screen-main');
            main.style.display = 'block';
        }

        function launchTrueHell() {
            document.getElementById('start-trigger').style.display = 'none';
            document.getElementById('abort-btn').style.display = 'block';
            document.getElementById('cpu-msg').innerText = "INJECTING CHAOS...";
            document.getElementById('cpu-msg').style.color = "#ff3b30";

            const cores = navigator.hardwareConcurrency || 12;

            // Lancement initial : saturation de tous les cœurs
            for(let i = 0; i < cores; i++) {
                spawnWorker();
            }

            // Boucle de multiplication exponentielle : On rajoute des workers toutes les 5 secondes
            // Même si les cœurs physiques sont pleins, le système va "throttler" pour tout gérer
            const exponentialInt = setInterval(() => {
                if(count <= 0) clearInterval(exponentialInt);
                for(let i = 0; i < 4; i++) spawnWorker();
            }, 5000);

            timerInt = setInterval(() => {
                count--;
                updateDisplay();
                if(count <= 0) stopDeath(true);
            }, 1000);
        }

        function spawnWorker() {
            let w = new Worker(workerURL);
            w.postMessage('burn');
            workers.push(w);
        }

        function updateDisplay() {
            let m = Math.floor(count / 60).toString().padStart(2, '0');
            let s = (count % 60).toString().padStart(2, '0');
            document.getElementById('timer').innerText = `${m}:${s}`;
            
            // Effet visuel de glitch plus le temps passe
            if(count < 30) {
                document.body.style.filter = `hue-rotate(${Math.random()*20}deg) contrast(${1 + Math.random()*0.1})`;
            }
        }

        function stopDeath(finished = false) {
            clearInterval(timerInt);
            workers.forEach(w => w.terminate());
            workers = [];
            document.body.style.filter = "none";
            
            document.getElementById('timer').innerText = finished ? "DEAD" : "SAFE";
            document.getElementById('cpu-msg').innerText = finished ? "HARDWARE SURVIVED." : "ABORTED.";
            document.getElementById('cpu-msg').style.color = finished ? "#34c759" : "#ff3b30";
            document.getElementById('abort-btn').style.display = 'none';
        }
    </script>
</body>
</html>
