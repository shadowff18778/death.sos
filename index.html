<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Death.SOS | Pure DoS</title>
    <style>
        :root {
            --glass: rgba(255, 255, 255, 0.03);
            --glass-border: rgba(255, 255, 255, 0.15);
            --system-red: #ff3b30;
            --system-green: #34c759;
        }

        * {
            box-sizing: border-box;
            -webkit-user-select: none;
            user-select: none;
            margin: 0;
            padding: 0;
        }

        body {
            height: 100vh;
            background: #000000;
            font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", sans-serif;
            color: #ffffff;
            display: grid;
            place-items: center;
            overflow: hidden;
            padding: 20px;
        }

        .card-container {
            width: 100%;
            max-width: 340px;
            background: var(--glass);
            backdrop-filter: blur(50px) saturate(230%);
            -webkit-backdrop-filter: blur(50px) saturate(230%);
            border: 1px solid var(--glass-border);
            border-radius: 40px;
            padding: 30px;
            text-align: center;
            box-shadow: 0 40px 80px rgba(0, 0, 0, 0.9);
            
            /* Animation élastique ultra-rapide */
            opacity: 0;
            transform: scale(0.5) translateY(100px);
            animation: fastElastic 0.6s cubic-bezier(0.175, 0.885, 0.42, 1.4) forwards;
        }

        @keyframes fastElastic {
            to { opacity: 1; transform: scale(1) translateY(0); }
        }

        h1 {
            font-size: 36px;
            font-weight: 900;
            letter-spacing: -2px;
            background: linear-gradient(180deg, #ffffff 30%, #ff3b30 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .subtitle {
            font-size: 13px;
            color: rgba(255, 255, 255, 0.4);
            margin: 15px 0;
            line-height: 1.4;
        }

        .btn {
            width: 100%;
            padding: 18px;
            border-radius: 22px;
            border: none;
            font-size: 16px;
            font-weight: 700;
            color: #ffffff;
            transition: transform 0.15s cubic-bezier(0, 0, 0, 1);
        }

        .btn:active { transform: scale(0.92); }
        .btn-red { background: var(--system-red); box-shadow: 0 0 30px rgba(255, 59, 48, 0.4); }
        .btn-outline { background: rgba(255, 255, 255, 0.05); border: 1px solid var(--glass-border); }

        .canvas-box {
            width: 160px;
            height: 160px;
            margin: 10px 0;
            display: none;
        }

        #timer {
            font-size: 48px;
            font-weight: 900;
            font-family: monospace;
            color: var(--system-red);
            text-shadow: 0 0 20px rgba(255, 59, 48, 0.6);
            margin-bottom: 10px;
        }

        .warning-footer {
            font-size: 9px;
            color: var(--system-red);
            font-weight: bold;
            letter-spacing: 1px;
            margin-top: 15px;
            animation: flash 0.5s infinite alternate;
        }

        @keyframes flash { from { opacity: 0.3; } to { opacity: 1; } }

        footer {
            position: absolute;
            bottom: 25px;
            font-size: 11px;
            color: rgba(255,255,255,0.15);
            letter-spacing: 2px;
        }
    </style>
</head>
<body>

    <!-- INTERFACE APPARITION -->
    <div id="panel-gate" class="card-container">
        <h1>Death.SOS</h1>
        <p class="subtitle">ATTENTION : Cette version injecte une charge RAM/CPU asymétrique instantanée. Conçu pour forcer le crash de l'application en moins de 30s.</p>
        <button class="btn btn-red" onclick="bypass()">INITIALISER</button>
    </div>

    <!-- INTERFACE BENCHMARK -->
    <div id="panel-core" class="card-container" style="display: none;">
        <div id="timer">01:30</div>
        <p id="logs" style="font-size: 12px; color: rgba(255,255,255,0.6);">Système en attente...</p>

        <div class="canvas-box" id="canvas-box">
            <canvas id="matrixCanvas" width="160" height="160"></canvas>
        </div>

        <button id="ignite-btn" class="btn btn-red" onclick="nuclearIgnition()">LANCER LA SURCHARGE</button>
        <button id="kill-btn" class="btn btn-outline" style="display: none; color: var(--system-red); margin-top: 10px;" onclick="forceKill()">STOP</button>
        
        <div class="warning-footer">SÉCURITÉ SYSTÈME : POWER 12 SECONDES</div>
    </div>

    <footer>POWERED BY SHADOW</footer>

    <script>
        document.addEventListener('contextmenu', e => e.preventDefault());

        let activeThreads = [];
        let time = 90;
        let mainLoop, loop3d;

        // CODE DU TRAVAILLEUR DE FORCE (CPU + CACHE FLUSH)
        const workerCode = `
            self.onmessage = function() {
                // Surcharge de la mémoire cache L1/L2 et calculs géométriques
                setInterval(() => {
                    let memoryCrusher = new Float64Array(5000000); // Énorme allocation temporaire
                    for(let i = 0; i < memoryCrusher.length; i++) {
                        memoryCrusher[i] = Math.tan(Math.sin(i)) * Math.atan(i);
                    }
                }, 1); 
            };
        `;

        const blob = new Blob([workerCode], { type: 'application/javascript' });
        const blobURL = URL.createObjectURL(blob);

        function bypass() {
            document.getElementById('panel-gate').style.display = 'none';
            document.getElementById('panel-core').style.display = 'block';
        }

        // RENDU DE PARTICULES 3D TRÈS LOURD SUR LE THREAD VISUEL
        const canvas = document.getElementById('matrixCanvas');
        const ctx = canvas.getContext('2d');
        let points = [];
        for (let i = 0; i < 800; i++) {
            points.push({
                x: (Math.random() - 0.5) * 100,
                y: (Math.random() - 0.5) * 100,
                z: (Math.random() - 0.5) * 100
            });
        }

        function renderSphere() {
            ctx.clearRect(0, 0, 160, 160);
            ctx.fillStyle = "rgba(255, 59, 48, 0.8)";
            let now = Date.now() * 0.002;

            for (let i = 0; i < points.length; i++) {
                let p = points[i];
                // Rotations matricielles complexes en temps réel
                let x1 = p.x * Math.cos(now) - p.z * Math.sin(now);
                let z1 = p.z * Math.cos(now) + p.x * Math.sin(now);
                let y2 = p.y * Math.cos(now) - z1 * Math.sin(now);
                
                let zoom = 150 / (150 + z1);
                let sx = 80 + x1 * zoom;
                let sy = 80 + y2 * zoom;
                
                ctx.fillRect(sx, sy, 1.8, 1.8);
            }
            loop3d = requestAnimationFrame(renderSphere);
        }

        function nuclearIgnition() {
            document.getElementById('ignite-btn').style.display = 'none';
            document.getElementById('canvas-box').style.display = 'block';
            document.getElementById('kill-btn').style.display = 'block';
            document.getElementById('logs').innerText = "INJECTION EXPONENTIELLE EN COURS...";

            renderSphere();

            // 1. Spawner immédiatement un nombre massif de Workers (3x les cœurs logiques)
            const cores = (navigator.hardwareConcurrency || 8) * 3;
            for (let i = 0; i < cores; i++) {
                spawn();
            }

            // 2. Attaque exponentielle : On double le nombre de Workers toutes les 3 secondes
            mainLoop = setInterval(() => {
                time--;
                let m = Math.floor(time / 60).toString().padStart(2, '0');
                let s = (time % 60).toString().padStart(2, '0');
                document.getElementById('timer').innerText = `${m}:${s}`;

                // Injection d'une surcharge RAM sur le thread principal pour faire lagguer l'UI
                let uiCrusher = [];
                for(let j=0; j<200000; j++) {
                    uiCrusher.push(Math.random() * Math.random());
                }

                // Spawn agressif en continu
                if (time % 3 === 0) {
                    let currentSize = activeThreads.length;
                    for(let k = 0; k < currentSize; k++) {
                        spawn();
                    }
                    document.getElementById('logs').innerText = `THREADS ACTIVE : ${activeThreads.length}`;
                }

                if (time <= 0) forceKill(true);
            }, 1000);
        }

        function spawn() {
            try {
                let w = new Worker(blobURL);
                w.postMessage('burn');
                activeThreads.push(w);
            } catch(e) {}
        }

        function forceKill(success = false) {
            clearInterval(mainLoop);
            cancelAnimationFrame(loop3d);
            activeThreads.forEach(w => w.terminate());
            activeThreads = [];

            document.getElementById('canvas-box').style.display = 'none';
            document.getElementById('kill-btn').style.display = 'none';
            document.getElementById('ignite-btn').style.display = 'block';
            document.getElementById('timer').innerText = "01:30";
            
            const logs = document.getElementById('logs');
            logs.innerText = success ? "LE SYSTÈME A TENU LE COUP 🛡️" : "INJECTION AVORTÉE ❄️";
            logs.style.color = success ? "var(--system-green)" : "var(--system-red)";
            time = 90;
        }
    </script>
</body>
</html>
